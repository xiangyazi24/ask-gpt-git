<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      body {
        min-width: 280px;
        margin: 0;
        padding: 12px;
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f9fafb;
      }
      label {
        display: block;
        margin: 0 0 8px;
        font-weight: 600;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        margin-top: 4px;
        padding: 7px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font: inherit;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      button {
        flex: 1;
        padding: 7px 8px;
        border: 1px solid #9ca3af;
        border-radius: 6px;
        background: #fff;
        color: #111827;
        font: inherit;
        cursor: pointer;
      }
      button.primary {
        border-color: #166534;
        background: #166534;
        color: #fff;
      }
      #out {
        display: none;
        margin-top: 10px;
        padding: 8px;
        border-radius: 6px;
        white-space: pre-wrap;
        font: 11px/1.4 monospace;
      }
      #out.ok {
        display: block;
        color: #14532d;
        background: #dcfce7;
      }
      #out.err {
        display: block;
        color: #7f1d1d;
        background: #fee2e2;
      }
      .section {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #e5e7eb;
      }
      .connector-status {
        padding: 6px 8px;
        border-radius: 6px;
        font: 12px/1.4 monospace;
        margin-top: 6px;
      }
      .conn-ok { background: #dcfce7; color: #14532d; }
      .conn-off { background: #fee2e2; color: #7f1d1d; }
      .conn-init { background: #fef3c7; color: #92400e; }
      .conn-unknown { background: #f3f4f6; color: #6b7280; }
    </style>
  </head>
  <body>
    <label>
      Bridge URL
      <input id="bridge-url" value="http://localhost:8801">
    </label>
    <label>
      Channel
      <input id="channel" list="channels" placeholder="Q1">
      <datalist id="channels"></datalist>
    </label>
    <div class="row">
      <button id="activate" class="primary">Activate</button>
      <button id="deactivate">Deactivate</button>
    </div>
    <div class="row">
      <button id="save">Save URL</button>
      <button id="test">Test</button>
    </div>

    <div class="section">
      <label>GitHub Connector</label>
      <div id="connector-status" class="connector-status conn-unknown">checking...</div>
    </div>

    <div id="out"></div>
    <script src="popup.js"></script>
  </body>
</html>
